apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-ha
  labels:
    app: nginx-ha

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx-ha

  template:
    metadata:
      labels:
        app: nginx-ha

    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80

          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"

            limits:
              memory: "64Mi"
              cpu: "100m"